name: shared
description: Shared models, services, and theme for Third Step Fish Trading apps.
version: 0.0.1

environment:
  sdk: ^3.11.4
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.9
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.5
  firebase_storage: ^12.4.5
  go_router: ^14.8.1
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  equatable: ^2.0.7
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
